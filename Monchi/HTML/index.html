<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONCHI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainBody" data-bs-theme="dark">

    <nav class="navbar navbar-expand-lg border-bottom border-secondary sticky-top bg-body">
        <div class="container">
            <a class="navbar-brand logo-text fs-3" href="index.html">Monchi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link fw-bold" href="About.html">About</a></li>
            <li class="nav-item"><a class="nav-link fw-bold" href="Privacy.html">Privacy</a></li>
            <li class="nav-item"><a class="nav-link fw-bold" href="Contact.html">Contact</a></li>
                    <li class="nav-item d-flex gap-2 ms-lg-3">
                        <button class="btn btn-sm btn-outline-secondary" onclick="setMode('dark')">🌙</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="setMode('feminine')">✨</button>
                    </li>
        </ul>
    </div>
        </div>
</nav>

    <div id="landingPage" class="container min-vh-100 d-flex flex-column align-items-center justify-content-center text-center pb-5">
        <h1 class="display-2 fw-800 mb-2 logo-text">MONCHI</h1>
        <p class="lead mb-5 opacity-75">Professional photo strips, right in your browser. best for ipad and laptops</p>
        
        <div class="card bg-body-tertiary border-secondary p-4 shadow-lg mb-5" style="max-width: 450px; width: 100%;">
            <div class="row g-3 text-start">
                <div class="col-6">
                    <label class="form-label small fw-bold">Template</label>
                    <select id="templateChoice" class="form-select">
                <option value="white">Classic White</option>
                <option value="pink">Soft Pink</option>
                <option value="dark">Midnight Dark</option>
            </select>
        </div>
                <div class="col-6">
                    <label class="form-label small fw-bold">Shots</label>
                    <select id="shotCount" class="form-select">
                <option value="1">1 Shot</option>
                <option value="3" selected>3 Shots</option>
                <option value="4">4 Shots</option>
            </select>
        </div>
            </div>
            <button class="btn btn-primary btn-lg w-100 mt-4 fw-bold py-3 rounded-pill" onclick="startApp()">LAUNCH BOOTH</button>
    </div>
</div>

    <div id="mainApp" class="container py-5 d-none">
    <div class="row justify-content-center g-4">
        <div class="col-lg-7">
                <div class="card bg-black border-secondary shadow-lg overflow-hidden position-relative mb-4 photo-frame">
                    <video id="video" class="w-100 h-100 object-fit-cover" autoplay playsinline></video>
                    <div id="countdown" class="position-absolute top-50 start-50 translate-middle display-1 fw-bold text-info"></div>
            </div>
            
                <div class="card bg-body-tertiary border-secondary p-3 shadow-sm">
                <div class="row g-2 align-items-end">
                        <div class="col-md-4 text-start">
                            <label class="form-label small fw-bold">Filter</label>
                        <select id="filter" class="form-select rounded-pill">
                            <option value="none">Normal</option>
                            <option value="grayscale(100%)">B&W</option>
                            <option value="sepia(100%)">Retro</option>
                            <option value="brightness(1.3) contrast(1.1)">Bright</option>
                        </select>
                    </div>
                        <div class="col-md-5 text-start">
                            <label class="form-label small fw-bold">Custom Label</label>
                        <input type="text" id="customDateText" class="form-control rounded-pill">
                    </div>
                        <div class="col-md-3">
                            <button id="snap" class="btn btn-primary w-100 fw-bold rounded-pill">SNAP!</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 text-center">
                <div id="gallery" class="p-2 shadow-lg rounded mx-auto strip-container">
                    <p class="text-muted small py-5">Ready for shots...</p>
        </div>
                <button id="downloadBtn" class="btn btn-success btn-lg w-100 mt-3 d-none shadow rounded-pill">💾 DOWNLOAD</button>
        </div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
